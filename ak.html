<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
font-family: Arial;
background:#0b0f2a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1b2145;
padding:30px;
border-radius:10px;
text-align:center;
width:300px;
}

input{
width:90%;
padding:10px;
margin:10px;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

<script>
function prank(){
alert("You got pranked 😄\n\nNever enter your password on unknown websites.");
}
</script>

</head>

<body>

<div class="box">

<h2>Secure Login</h2>

<input type="email" placeholder="Email"><br>

<input type="password" placeholder="Password"><br>

<button onclick="prank()">Login</button>

</div>

</body>
</html>
